name: Feature request
description: Suggest a capability or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what's painful?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Ama to do? A tool, a CLI flag, a language/framework, …
    validations:
      required: false
